<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Protected Journal</title>
    <link rel="stylesheet" href="style.css">
    <!-- html2pdf library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="controls" class="no-print">
        <h2>My Safe Space</h2>
        <div class="button-group">
            <button onclick="setTheme('pink-green')">🌸 Pink & Green (Prompts)</button>
            <button onclick="setTheme('blue')">🦋 Blue (Sad / Songs)</button>
            <button onclick="setTheme('yellow')">🌻 Yellow (Happy / Sunflowers)</button>
        </div>
        <div class="button-group" style="margin-top: 10px;">
            <button onclick="addPage()" class="action-btn">+ Add Page</button>
            <button onclick="downloadPDF()" class="action-btn download-btn">⬇️ Download as PDF</button>
        </div>
        <p class="privacy-note">Privacy Note: Everything runs in your browser. Nothing is saved online.</p>
    </div>

    <!-- The main journal container that will be converted to PDF -->
    <div id="journal-container">
        <!-- Pages will be injected here by JavaScript -->
    </div>

    <!-- Talking Flower Element -->
    <div id="talking-flower" class="no-print">
        <div id="flower-message">I'm so glad you're here today!</div>
        <div class="flower-icon">🌸</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
